name: Android CI

on:
  push:
    branches:
      - claude/pokedex-android-app-i3e8mw
  workflow_dispatch:
    inputs:
      max_id:
        description: "Highest national dex id to bundle"
        required: false
        default: "1025"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate bundled dataset from PokeAPI
        id: dataset
        continue-on-error: true
        env:
          MAX_ID: ${{ github.event.inputs.max_id || '1025' }}
          CONCURRENCY: "16"
        run: node tools/generate-dataset.mjs

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pokedex-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
